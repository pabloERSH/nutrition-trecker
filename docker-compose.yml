services:
  nutrition:
    build: .
    container_name: nutrition-trecker
    restart: unless-stopped
    env_file: .env
    ports:
      - "8001:8000"
    volumes:
      - logs:/app/logs
    networks:
      - nutrition-network
      - shared-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:16.4-alpine
    container_name: nutrition-db
    restart: unless-stopped
    env_file: .env
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nutrition-network

  redis:
    image: redis:7.2-alpine
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data
    networks:
      - nutrition-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    mem_limit: 60m

  nginx:
    image: nginx:latest
    ports:
      - "8002:80"
    volumes:
      - ./nutrition/static:/static
      - ./nutrition/media:/media
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - nutrition
    networks:
      - nutrition-network

volumes:
  esdata01:
  redis_data:
  logs:
  postgres_data:

networks:
  nutrition-network:
    driver: bridge
  
  shared-network:
    external: true
    name: shared-network